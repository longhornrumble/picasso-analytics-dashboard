name: PR Quality Gates

on:
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '22'
  AWS_REGION: 'us-east-1'

jobs:
  lint:
    name: Code Quality - Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

  typecheck-and-build:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check and build (staging mode)
        run: npm run build:staging

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: dist/
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high

  tests:
    name: Scheduling Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Scheduling-scoped on purpose: the sub-phase E Customer-Portal surfaces need a real
      # CI gate, but the dashboard has ~108 pre-existing red tests elsewhere (tracked as a
      # post-pilot cleanup). Scoping to the scheduling suites makes this a meaningful
      # merge-gate for WS-E-PORTAL without the unrelated red noise blocking every PR.
      - name: Run scheduling test suite
        run: npm run test:scheduling

  deploy-staging:
    name: Deploy to Staging
    needs: [lint, typecheck-and-build, security, tests]
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    # Shared deploy mechanics (sync → invalidate → smoke → PR comment) live
    # in the reusable workflow — CI-modernization Phase 2.1. Quality gates
    # stay in this repo.
    # SHA-pinned (picasso Phase-2 audit D8) — keep in sync with the pin in
    # deploy-production.yml; bump both deliberately to adopt reusable changes.
    uses: longhornrumble/picasso/.github/workflows/deploy-frontend.yml@aec1b46e8d242b3d123a8b7ff51c41fc44e635e6
    with:
      environment: staging
      artifact_name: dashboard-build
      bucket: picasso-analytics-portal-staging
      cloudfront_distribution_id: E2R9VHBON5PHMK
      website_url: https://d2t5sxdcthprgd.cloudfront.net
      comment_pr: true
    secrets:
      deploy_role_arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
