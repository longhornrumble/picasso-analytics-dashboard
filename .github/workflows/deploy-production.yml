name: Deploy Analytics Dashboard

# Production deploy. Push to main runs quality gates + build only (final
# verification — staging was already exercised by pr-checks during the PR).
# The deploy-production job is DISPATCH-ONLY: promoting to prod is a
# deliberate `gh workflow run "Deploy Analytics Dashboard"`. Uniform model
# across all front-ends since CI-modernization Phase 2; deploy mechanics
# (incl. the releases/<sha>/ rollback copy) live in the shared reusable
# workflow longhornrumble/picasso/.github/workflows/deploy-frontend.yml.

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

env:
  NODE_VERSION: '22'
  AWS_REGION: 'us-east-1'

# Serialize runs (picasso Phase-2 audit D1): two simultaneous dispatches
# would race the live-bucket sync (--delete) and the prev-release lookup
# in the reusable. Queue behind a mid-flight run, never cancel it.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  lint:
    name: Code Quality - Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

  typecheck-and-build:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check and build (production mode)
        # Default `vite build` is production mode → loads .env.production
        # which is committed to the repo (publishable values only).
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: dist/
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high

  deploy-production:
    name: Deploy to Production
    needs: [lint, typecheck-and-build, security]
    # Dispatch-only prod deploys (uniform model, CI-modernization Phase 2 —
    # same shape as config-builder/widget since Phase 0.3): push to main runs
    # gates + build as final verification; promoting to prod is a deliberate
    # `gh workflow run`. The previous `environment: production` marker had no
    # required reviewers (toothless), and reusable-caller jobs can't carry
    # `environment:` anyway — the dispatch IS the deliberate act.
    if: github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    # Shared deploy mechanics incl. the immutable releases/<sha>/ rollback
    # copy (Phase 2.2) — rollback = re-sync a prior release prefix (exact
    # command in the run summary).
    # SHA-pinned (picasso Phase-2 audit D8): @main meant any reusable change
    # could startup_failure this workflow with no warning in THIS repo (the
    # picasso#494 class). Bump deliberately to adopt reusable changes.
    # Current pin = picasso#561/#562 (D10 fix: the prior pin 643e0d8 carried
    # an auto-rollback that would WIPE the live bucket; this pin rewrites it
    # download-then-upload + adds an empty-source abort guard).
    uses: longhornrumble/picasso/.github/workflows/deploy-frontend.yml@aec1b46e8d242b3d123a8b7ff51c41fc44e635e6
    with:
      environment: production
      artifact_name: dashboard-build
      bucket: app-myrecruiter-ai
      cloudfront_distribution_id: EJ0Y6ZUIUBSAT
      website_url: https://d3r39xkfb0snuq.cloudfront.net
    secrets:
      deploy_role_arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
