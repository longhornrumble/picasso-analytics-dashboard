name: Deploy Analytics Dashboard

# Production deploy. Triggered by push to main (typically a merged PR).
# Staging is handled by pr-checks.yml during the PR — when this fires,
# the change has already been validated on staging.

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

env:
  NODE_VERSION: '22'
  AWS_REGION: 'us-east-1'
  S3_BUCKET_PRODUCTION: 'app-myrecruiter-ai'
  CLOUDFRONT_PRODUCTION_ID: 'EJ0Y6ZUIUBSAT'

jobs:
  lint:
    name: Code Quality - Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

  typecheck-and-build:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check and build (production mode)
        # Default `vite build` is production mode → loads .env.production
        # which is committed to the repo (publishable values only).
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: dist/
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high

  deploy-production:
    name: Deploy to Production
    needs: [lint, typecheck-and-build, security]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dashboard-build
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to production S3
        run: aws s3 sync dist/ s3://${{ env.S3_BUCKET_PRODUCTION }}/ --delete

      - name: Invalidate production CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_PRODUCTION_ID }} \
            --paths "/*"
